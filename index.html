<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Team — Homepage Previews</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100svh;display:grid;place-items:center;background:#0d0c0b;color:#efebe3;
    font-family:Inter,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  main{text-align:center;padding:2rem}
  p{font-family:ui-monospace,Menlo,monospace;font-size:.62rem;letter-spacing:.34em;
    color:rgba(239,235,227,.45);margin-bottom:2.2rem}
  nav{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}
  a{display:inline-flex;flex-direction:column;gap:.35rem;text-decoration:none;color:#efebe3;
    border:1px solid rgba(239,235,227,.16);border-radius:6px;padding:1.3rem 2.2rem;
    transition:border-color .25s,background .25s}
  a:hover{border-color:#d9fa87;background:rgba(217,250,135,.05)}
  a b{font-size:1.3rem;font-weight:500;letter-spacing:-.02em}
  a span{font-family:ui-monospace,Menlo,monospace;font-size:.56rem;letter-spacing:.22em;
    color:rgba(239,235,227,.45)}
</style>
</head>
<body>
<main>
  <p>TEAM — HOMEPAGE PREVIEWS · INTERNAL</p>
  <nav>
    <a href="v1/"><b>V1</b><span>MISSION NARRATIVE</span></a>
    <a href="v2/"><b>V2</b><span>BEHIND THE GLASS</span></a>
